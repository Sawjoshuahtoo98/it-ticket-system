version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-db
    environment:
      POSTGRES_DB:       helpdesk
      POSTGRES_USER:     helpdesk_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U helpdesk_user -d helpdesk"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: helpdesk-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:             development
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_NAME:              helpdesk
      DB_USER:              helpdesk_user
      DB_PASSWORD:          ${DB_PASSWORD:-localpass}
      JWT_ACCESS_SECRET:    ${JWT_ACCESS_SECRET:-devsecret_access_change_me}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET:-devsecret_refresh_change_me}
      JWT_ACCESS_EXPIRES:   15m
      JWT_REFRESH_EXPIRES:  7d
      SMTP_HOST:            ${SMTP_HOST:-sandbox.smtp.mailtrap.io}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_SECURE:          "false"
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
      EMAIL_FROM:           HelpDesk <noreply@helpdesk.com>
      FRONTEND_URL:         http://localhost:5500
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # Optional: nginx to serve frontend + proxy API
  nginx:
    image: nginx:alpine
    container_name: helpdesk-web
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
